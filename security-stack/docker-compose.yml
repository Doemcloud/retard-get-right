networks:
  security-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  opensearch-data:
  filebeat-etc:
  filebeat-var:
  minio-data:
  samba-data:
  suricata-logs:
  nginx-logs:

services:
  # ================= SURICATA IDS/IPS =================
  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    hostname: suricata
    restart: unless-stopped
    network_mode: host          # для захвата трафика
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata/config/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/rules:/etc/suricata/rules:ro
      - suricata-logs:/var/log/suricata
    command: suricata -c /etc/suricata/suricata.yaml --af-packet -l /var/log/suricata

  # ================= MINIO (Backup) =================
  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    restart: unless-stopped
    networks:
      security-net:
        ipv4_address: 172.20.0.20
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=MinioSecure123!
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  # ================= SAMBA AD DC =================
  samba-dc:
    image: nowsci/samba-domain:latest
    container_name: samba-dc
    hostname: dc1
    restart: unless-stopped
    networks:
      security-net:
        ipv4_address: 172.20.0.30
    ports:
      - "53:53"
      - "53:53/udp"
      - "88:88"
      - "88:88/udp"
      - "135:135"
      - "139:139"
      - "389:389"
      - "389:389/udp"
      - "445:445"
      - "464:464"
      - "636:636"
      - "3268:3268"
      - "3269:3269"
    environment:
      - DOMAIN=SECURITY
      - DOMAINPASS=Admin@SecurePass123
      - REALM=SECURITY.LOCAL
      - DNSFORWARDER=8.8.8.8
      - HOSTIP=172.20.0.30
      - NOCOMPLEXITY=false
    volumes:
      - samba-data:/var/lib/samba
    cap_add:
      - SYS_ADMIN
    privileged: true

  # ================= NGINX + ModSecurity WAF =================
  nginx-waf:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-waf
    hostname: nginx-waf
    restart: unless-stopped
    networks:
      security-net:
        ipv4_address: 172.20.0.40
    ports:
      - "80:80"
      - "8443:443"
    volumes:
      - ./nginx/modsecurity:/etc/nginx/modsecurity:ro
      - nginx-logs:/var/log/nginx

