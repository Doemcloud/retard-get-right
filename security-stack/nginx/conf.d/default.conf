# ═══════════════════════════════════════════════════════════
# Nginx WAF — Main Configuration
# ═══════════════════════════════════════════════════════════

# Скрываем версию сервера
server_tokens off;

# Rate limiting зоны
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ─────────────────────────────────────
# HTTP → HTTPS редирект
# ─────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Разрешаем health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Всё остальное — редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────
# HTTPS + WAF
# ─────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # SSL
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ModSecurity WAF
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsecurity/modsecurity.conf;

    # Security Headers (OWASP рекомендации)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Убираем лишние заголовки
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Ограничение соединений
    limit_conn conn_limit 20;
    limit_req zone=general burst=50 nodelay;

    # Максимальный размер тела запроса
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Логирование
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # ─────────────────────────────────
    # Блокировка опасных методов
    # ─────────────────────────────────
    if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
        return 405;
    }

    # ─────────────────────────────────
    # Защита login endpoint
    # ─────────────────────────────────
    location ~* ^/(login|signin|auth|wp-login\.php) {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────
    # API endpoints
    # ─────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────
    # Блокировка чувствительных файлов
    # ─────────────────────────────────
    location ~* \.(env|git|htaccess|htpasswd|config|bak|backup|sql|db|log|ini|conf)$ {
        deny all;
        return 403;
    }

    location ~ /\. {
        deny all;
        return 403;
    }

    # ─────────────────────────────────
    # Основной проксируемый сервис
    # ─────────────────────────────────
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ─────────────────────────────────
    # Страница ошибки 403
    # ─────────────────────────────────
    error_page 403 /403.html;
    location = /403.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# ─────────────────────────────────────
# Upstream backend (настроить под свой сервис)
# ─────────────────────────────────────
upstream backend {
    server 127.0.0.1:8080;
    keepalive 32;
}
