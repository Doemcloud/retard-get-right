# ═══════════════════════════════════════════════════════════
# ModSecurity Configuration — OWASP Top 10 Protection
# ═══════════════════════════════════════════════════════════

# Режим: On = блокировать, DetectionOnly = только логировать
SecRuleEngine On

# Обработка тела запроса
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyInMemoryLimit 131072
SecRequestBodyLimitAction Reject

# Обработка тела ответа
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json
SecResponseBodyLimit 524288
SecResponseBodyLimitAction ProcessPartial

# Временные файлы
SecTmpDir /tmp/
SecDataDir /tmp/

# Логирование
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogType Serial
SecAuditLog /var/log/nginx/modsec_audit.log
SecAuditLogFormat JSON
SecAuditLogParts ABCFHZ

# Debug (отключить в продакшне)
SecDebugLog /var/log/nginx/modsec_debug.log
SecDebugLogLevel 0

# Кодировка
SecArgumentSeparator &
SecCookieFormat 0
SecUnicodeMapFile unicode.mapping 20127
SecStatusEngine On

# ─────────────────────────────────────
# OWASP CRS НАСТРОЙКИ
# ─────────────────────────────────────

# Уровень паранойи (1-4, рекомендуется 2 для начала)
SecAction \
  "id:900000,\
  phase:1,\
  nolog,\
  pass,\
  t:none,\
  setvar:tx.paranoia_level=2"

# Уровень аномалий для блокировки
SecAction \
  "id:900110,\
  phase:1,\
  nolog,\
  pass,\
  t:none,\
  setvar:tx.inbound_anomaly_score_threshold=5,\
  setvar:tx.outbound_anomaly_score_threshold=4"

# Максимальный размер данных
SecAction \
  "id:900200,\
  phase:1,\
  nolog,\
  pass,\
  t:none,\
  setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE,\
  setvar:tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |text/xml| |application/xml| |application/soap+xml| |application/json| |application/cloudevents+json| |application/cloudevents-batch+json|,\
  setvar:tx.allowed_http_versions=HTTP/1.0 HTTP/1.1 HTTP/2 HTTP/2.0,\
  setvar:tx.restricted_extensions=.asa/ .asax/ .ascx/ .axd/ .backup/ .bak/ .bat/ .cdx/ .cer/ .cfg/ .cmd/ .com/ .config/ .conf/ .cs/ .csproj/ .csr/ .dat/ .db/ .dbf/ .dll/ .dos/ .htr/ .htw/ .ida/ .idc/ .idq/ .inc/ .ini/ .key/ .licx/ .lnk/ .log/ .mdb/ .old/ .pass/ .pdb/ .pol/ .printer/ .pwd/ .rdb/ .resources/ .resx/ .sql/ .swp/ .sys/ .vb/ .vbs/ .vbproj/ .vsdisco/ .webinfo/ .xsd/ .xsx/,\
  setvar:tx.restricted_headers=/proxy/ /lock-token/ /content-range/ /if/,\
  setvar:tx.static_extensions=/.jpg/ /.jpeg/ /.png/ /.gif/ /.js/ /.css/ /.ico/ /.svg/ /.webp/"

# ─────────────────────────────────────
# КАСТОМНЫЕ ПРАВИЛА OWASP Top 10
# ─────────────────────────────────────

# A01 — Path Traversal
SecRule REQUEST_URI "@rx (?:\.\./|\.\.\\|%2e%2e(?:%2f|%5c))" \
  "id:1000001,\
  phase:1,\
  deny,\
  status:403,\
  log,\
  msg:'OWASP A01: Path Traversal Attack',\
  logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}',\
  tag:'OWASP_CRS/WEB_ATTACK/PATH_TRAVERSAL',\
  severity:'CRITICAL'"

# A03 — SQL Injection (дополнительные правила)
SecRule ARGS "@detectSQLi" \
  "id:1000020,\
  phase:2,\
  deny,\
  status:403,\
  log,\
  msg:'OWASP A03: SQL Injection Detected',\
  tag:'OWASP_CRS/WEB_ATTACK/SQL_INJECTION',\
  severity:'CRITICAL'"

# A03 — XSS
SecRule ARGS "@detectXSS" \
  "id:1000030,\
  phase:2,\
  deny,\
  status:403,\
  log,\
  msg:'OWASP A03/XSS: Cross-Site Scripting Detected',\
  tag:'OWASP_CRS/WEB_ATTACK/XSS',\
  severity:'CRITICAL'"

# A05 — Sensitive files
SecRule REQUEST_URI "@rx \.(env|git|htaccess|htpasswd|config|bak|backup|sql|db)$" \
  "id:1000040,\
  phase:1,\
  deny,\
  status:403,\
  log,\
  msg:'OWASP A05: Sensitive File Access Attempt',\
  tag:'OWASP_CRS/WEB_ATTACK/SENSITIVE_FILE',\
  severity:'HIGH'"

# A10 — SSRF
SecRule ARGS "@rx https?://(localhost|127\.0\.0\.1|169\.254\.169\.254|0\.0\.0\.0|::1)" \
  "id:1000090,\
  phase:2,\
  deny,\
  status:403,\
  log,\
  msg:'OWASP A10: SSRF Attempt Detected',\
  tag:'OWASP_CRS/WEB_ATTACK/SSRF',\
  severity:'CRITICAL'"

# Блокировка сканеров
SecRule REQUEST_HEADERS:User-Agent "@rx (nikto|sqlmap|nmap|masscan|zgrab|dirbuster|gobuster|wfuzz|hydra|medusa)" \
  "id:1000200,\
  phase:1,\
  deny,\
  status:403,\
  log,\
  msg:'Security Scanner Detected',\
  tag:'RECON/SCANNER',\
  severity:'HIGH',\
  t:lowercase"

# Включаем OWASP CRS правила
Include /etc/modsecurity.d/owasp-crs/crs-setup.conf
Include /etc/modsecurity.d/owasp-crs/rules/*.conf
