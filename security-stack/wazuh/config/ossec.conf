<ossec_config>

  <!-- ==================== GLOBAL SETTINGS ==================== -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <email_notification>no</email_notification>
    <agents_disconnection_time>10m</agents_disconnection_time>
  </global>

  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <logging>
    <log_format>plain</log_format>
  </logging>

  <!-- ==================== NETWORK INPUT ==================== -->
  <!-- Агентские подключения -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- Приём syslog от приложений (Suricata, Nginx, Samba) -->
  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>udp</protocol>
    <allowed-ips>172.20.0.0/24</allowed-ips>
  </remote>

  <!-- ==================== LOG COLLECTION - WEB SERVERS ==================== -->
  <!-- Nginx access log - формат комбинированный для детекции атак -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- Apache (если используется) -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <!-- Auth logs - для детекции брутфорса (A07) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- Suricata EVE JSON - для корреляции с IDS (A03, A09, A10) -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/suricata/eve.json</location>
  </localfile>

  <!-- ==================== ACTIVE RESPONSE - БЛОКИРОВКА ==================== -->
  <active-response>
    <ca_verification>yes</ca_verification>
    <ca_store>etc/wpk_root.pem</ca_store>
    
    <!-- Автоматическая блокировка при уровне алерта >= 7 -->
    <blocked_ips>
      <white_list>127.0.0.1</white_list>
      <white_list>^172\.20\.0\.</white_list>  <!-- Разрешить внутреннюю сеть -->
    </blocked_ips>
    
    <!-- Команда блокировки через iptables -->
    <command>
      <name>firewall-drop</name>
      <executable>firewall-drop.sh</executable>
      <timeout_allowed>yes</timeout_allowed>
      <expect>srcip</expect>
      <timeout>3600</timeout>  <!-- Блокировка на 1 час -->
    </command>
    
    <!-- Правила авто-блокировки -->
    <rules>
      <!-- SQL Injection (A03) -->
      <rule id="50001">firewall-drop</rule>
      <!-- XSS (A03) -->
      <rule id="50002">firewall-drop</rule>
      <!-- Path Traversal / LFI (A01, A05) -->
      <rule id="50003">firewall-drop</rule>
      <!-- SSRF (A10) -->
      <rule id="50004">firewall-drop</rule>
      <!-- Brute Force Auth (A07) -->
      <rule id="50005">firewall-drop</rule>
      <!-- Command Injection (A03) -->
      <rule id="50006">firewall-drop</rule>
      <!-- Suspicious User-Agent / Scanner (A05) -->
      <rule id="50007">firewall-drop</rule>
    </rules>
  </active-response>

  <!-- Скрипт блокировки (должен существовать в /var/ossec/active-response/bin/) -->
  <command>
    <name>firewall-drop.sh</name>
    <executable>firewall-drop.sh</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- ==================== FILE INTEGRITY MONITORING ==================== -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    
    <!-- Критичные конфиги веб-сервера (A05) -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/nginx</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/apache2</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/php</directories>
    
    <!-- Бинарники и библиотеки (A06, A08) -->
    <directories check_all="yes" realtime="yes">/usr/bin</directories>
    <directories check_all="yes" realtime="yes">/usr/sbin</directories>
    
    <ignore type="sregex">.log$|.swp$|.tmp$</ignore>
  </syscheck>

  <!-- ==================== ROOTCHECK - SECURITY BASELINE ==================== -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- ==================== RULESET - OWASP TOP 10 ==================== -->
  <ruleset>
    <!-- Стандартные правила Wazuh -->
    <rules>rules_config.xml</rules>
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
    
    <!-- Исключения шумных правил -->
    <rule_exclude>0215-policy-rules.xml</rule_exclude>
    
    <!-- Списки для корреляции -->
    <list>etc/lists/audit-keys</list>
    
    <!-- Кастомные правила для OWASP -->
    <include>rules/owasp-top10.xml</include>
  </ruleset>

  <!-- ==================== VULNERABILITY (опционально) ==================== -->
  <!-- Закомментировано для Community-версии -->
  <!--
  <vulnerability-detector>
    <enabled>no</enabled>
  </vulnerability-detector>
  -->

</ossec_config>